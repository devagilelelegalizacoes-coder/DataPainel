{% extends "base.html" %}
{% block title %}Login - {{ get_config().nome_sistema }}{% endblock %}
{% block content %}
<div class="auth-card">
  {% if get_config().tem_logo_login %}
  <img src="/config/logo-login" alt="{{ get_config().nome_sistema }}" class="logo-preview">
  {% endif %}
  <h1>Entrar</h1>
  {% if error %}<p class="alert alert-error">{{ error }}</p>{% endif %}
  <form method="post" action="/login">
    <label>E-mail</label>
    <input type="email" name="email" required autofocus>

    <label>Senha</label>
    <input type="password" name="password" required>

    <button type="submit" class="btn-primary">Entrar</button>
  </form>
  <p class="auth-footer">Ainda não tem conta? <a href="/registro">Solicitar cadastro</a></p>
</div>
{% endblock %}
